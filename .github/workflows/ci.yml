name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Show Swift version
        run: swift --version

      - name: Install llama.cpp
        run: brew install llama.cpp

      - name: Build release
        run: swift build -c release

      - name: Check package script syntax
        run: bash -n scripts/package-macos.sh

      - name: Check Python example syntax
        run: python3 -m py_compile examples/python_chatbot.py
